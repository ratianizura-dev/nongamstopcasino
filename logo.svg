<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162b55"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0b429"/>
      <stop offset="100%" style="stop-color:#d4930a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Gold ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.6"/>

  <!-- Red X cross (GamStop crossed out) -->
  <line x1="62" y1="62" x2="138" y2="138" stroke="#e74c3c" stroke-width="11" stroke-linecap="round"/>
  <line x1="138" y1="62" x2="62" y2="138" stroke="#e74c3c" stroke-width="11" stroke-linecap="round"/>

  <!-- White circle behind X to make it pop -->
  <circle cx="100" cy="100" r="32" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- NGC text at bottom -->
  <text x="100" y="174" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="3">NON GAMSTOP</text>

  <!-- Small dot separators -->
  <circle cx="100" cy="155" r="2" fill="#f0b429" opacity="0.5"/>
</svg>
