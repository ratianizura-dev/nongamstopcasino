<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162b55"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#f0b429" stroke-width="1.5" opacity="0.7"/>
  <!-- Red X -->
  <line x1="8" y1="8" x2="24" y2="24" stroke="#e74c3c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="8" y2="24" stroke="#e74c3c" stroke-width="3.5" stroke-linecap="round"/>
  <!-- NG letters top left and bottom right subtly -->
  <text x="16" y="29" font-family="Arial Black, sans-serif" font-size="5" font-weight="900" fill="#f0b429" text-anchor="middle" letter-spacing="0.5">NGS</text>
</svg>
